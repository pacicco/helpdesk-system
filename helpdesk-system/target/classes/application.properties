# Configuracao de conexao com o PostgreSQL
# IMPORTANTE: troque "sua_senha_aqui" pela senha que voce definiu no PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/helpdesk_db
spring.datasource.username=postgres
spring.datasource.password=Camisa12@

# Faz o Hibernate criar/atualizar as tabelas automaticamente a partir das classes @Entity
# "update" mantem os dados existentes e so ajusta a estrutura quando necessario
spring.jpa.hibernate.ddl-auto=update

# Mostra no console o SQL que esta sendo executado (util para aprender/depurar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Porta em que a aplicacao vai rodar (padrao 8080)
server.port=8081
